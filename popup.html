<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <span class="logo">🏠</span>
      <h1>Zoopla Crawler</h1>
    </header>

    <section class="card">
      <h2 class="card-title">Trang hiện tại</h2>
      <p id="pageStatus" class="card-desc">Mở Zoopla để bắt đầu.</p>
      <div id="currentPageActions" class="hidden">
        <button type="button" id="btnExtractOne" class="btn btn-primary btn-block">Lưu listing này</button>
      </div>
    </section>

    <section class="card card-highlight">
      <h2 class="card-title">Thu thập link (nhiều trang)</h2>
      <p class="card-desc">Mở trang tìm kiếm Zoopla (vd: for-sale/property/manchester/), cấu hình rồi bấm thu thập.</p>
      <div class="form-group">
        <label for="inputMaxPages">Số trang tối đa</label>
        <input type="number" id="inputMaxPages" min="1" max="100" value="5" class="input">
      </div>
      <div class="form-group">
        <label for="inputMaxRecords">Số bản ghi tối đa</label>
        <input type="number" id="inputMaxRecords" min="1" max="5000" value="500" class="input">
      </div>
      <div class="btn-row">
        <button type="button" id="btnCollectMulti" class="btn btn-primary">Thu thập link (nhiều trang)</button>
      </div>
      <div id="collectProgress" class="progress-box hidden">
        <p id="collectProgressText" class="progress-text"></p>
      </div>
      <div id="linksInfo" class="hidden">
        <p class="card-desc">Đã có <strong id="linksCount">0</strong> link. Bấm "Crawl từng trang" để lấy dữ liệu từng listing.</p>
        <button type="button" id="btnCrawlPages" class="btn btn-primary btn-block">Crawl từng trang</button>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">Dữ liệu đã lưu</h2>
      <p id="savedCount" class="card-desc">Đang tải...</p>
      <div class="btn-row">
        <button type="button" id="btnExportCsv" class="btn">Export CSV</button>
        <button type="button" id="btnSendBackend" class="btn">Gửi lên Backend</button>
      </div>
      <p id="backendStatus" class="status-msg hidden"></p>
    </section>

    <footer class="footer">
      <a href="#" id="linkOptions" class="link">Cài đặt (Backend URL)</a>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
