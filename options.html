<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Zoopla Crawler - Cài đặt</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 480px; }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
    button { margin-top: 16px; padding: 8px 16px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    .hint { font-size: 12px; color: #666; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>Cài đặt Zoopla Crawler</h1>
  <label for="backendUrl">Backend URL (để gửi dữ liệu lên server)</label>
  <input type="url" id="backendUrl" placeholder="https://your-app.onrender.com hoặc http://localhost:8501">
  <p class="hint">Ví dụ: nếu chạy app Streamlit local: http://localhost:8501. App phải có API POST /api/properties nhận JSON { "properties": [...] }.</p>
  <button id="save">Lưu</button>
  <p id="status" style="margin-top:12px;color:green;"></p>
  <script src="options.js"></script>
</body>
</html>
